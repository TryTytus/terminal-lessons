version: 1
id: git-full-course
title: "Git Full Course"
summary: "A complete hands-on Git roadmap from init and status to rebase, cherry-pick, reset, tags, and bisect."
description: "Practice Git through focused terminal exercises with one command form at a time. The roadmap covers repository setup, staging, committing, inspecting history, moving across branches, integrating work with merge/rebase/cherry-pick, undoing safely with reset/restore, release tagging, object inspection with show, and binary-search debugging with bisect."
difficulty: "beginner to advanced"
commands:
  - name: "init"
    title: "Start repositories with git init"
    summary: "Create a new repository and choose the initial branch name."
    guide: "commands/init.md"
    manual: "manuals/init.md"
    lessons:
      - path: "lessons/git-init-basic.yaml"
        focus: "Initialize a new Git repository"
        flag: "git init"
        kind: "foundation"
      - path: "lessons/git-init-main-branch.yaml"
        focus: "Initialize with a named initial branch"
        flag: "-b"
        kind: "parameter"
  - name: "status"
    title: "Inspect workspace state with git status"
    summary: "Read tracked, staged, and untracked changes in long and short forms."
    guide: "commands/status.md"
    manual: "manuals/status.md"
    lessons:
      - path: "lessons/git-status-porcelain.yaml"
        focus: "Read staged and unstaged changes in short output"
        flag: "--short"
        kind: "parameter"
      - path: "lessons/git-status-branch-short.yaml"
        focus: "Inspect branch and index summary quickly"
        flag: "-sb"
        kind: "parameter"
  - name: "add"
    title: "Stage changes with git add"
    summary: "Stage one file, stage all, and stage tracked-file updates only."
    guide: "commands/add.md"
    manual: "manuals/add.md"
    lessons:
      - path: "lessons/git-add-single-file.yaml"
        focus: "Stage a single file"
        flag: "git add <file>"
        kind: "foundation"
      - path: "lessons/git-add-all-dot.yaml"
        focus: "Stage all new and modified files under the current directory"
        flag: "git add ."
        kind: "parameter"
      - path: "lessons/git-add-update-tracked.yaml"
        focus: "Stage modifications and deletions for tracked files only"
        flag: "-u"
        kind: "parameter"
  - name: "commit"
    title: "Record snapshots with git commit"
    summary: "Create commits, edit the latest commit message, and amend without changing the message."
    guide: "commands/commit.md"
    manual: "manuals/commit.md"
    lessons:
      - path: "lessons/git-commit-message.yaml"
        focus: "Create a commit with a message"
        flag: "-m"
        kind: "foundation"
      - path: "lessons/git-commit-amend-message.yaml"
        focus: "Rewrite the latest commit message"
        flag: "--amend -m"
        kind: "parameter"
      - path: "lessons/git-commit-amend-no-edit.yaml"
        focus: "Amend commit content while keeping message"
        flag: "--amend --no-edit"
        kind: "parameter"
  - name: "log"
    title: "Browse history with git log"
    summary: "Use concise history, graph view, limits, and per-commit stats."
    guide: "commands/log.md"
    manual: "manuals/log.md"
    lessons:
      - path: "lessons/git-log-oneline.yaml"
        focus: "View compact commit history"
        flag: "--oneline"
        kind: "foundation"
      - path: "lessons/git-log-graph-all.yaml"
        focus: "View commit graph across branches"
        flag: "--graph --decorate --all"
        kind: "parameter"
      - path: "lessons/git-log-limit.yaml"
        focus: "Limit history output to recent commits"
        flag: "-n"
        kind: "parameter"
      - path: "lessons/git-log-stat.yaml"
        focus: "Show changed-file statistics per commit"
        flag: "--stat"
        kind: "parameter"
  - name: "diff"
    title: "Inspect changes with git diff"
    summary: "Compare working tree, staged content, and compact file-change stats."
    guide: "commands/diff.md"
    manual: "manuals/diff.md"
    lessons:
      - path: "lessons/git-diff-working-tree.yaml"
        focus: "Inspect unstaged line changes"
        flag: "git diff"
        kind: "foundation"
      - path: "lessons/git-diff-staged.yaml"
        focus: "Inspect staged changes"
        flag: "--staged"
        kind: "parameter"
      - path: "lessons/git-diff-stat.yaml"
        focus: "Inspect diff summary by files"
        flag: "--stat"
        kind: "parameter"
  - name: "branch"
    title: "Manage branches with git branch"
    summary: "Create, rename, list, and delete merged branches."
    guide: "commands/branch.md"
    manual: "manuals/branch.md"
    lessons:
      - path: "lessons/git-branch-create-list.yaml"
        focus: "Create and list branches"
        flag: "git branch <name>"
        kind: "foundation"
      - path: "lessons/git-branch-rename.yaml"
        focus: "Rename a branch"
        flag: "-m"
        kind: "parameter"
      - path: "lessons/git-branch-delete-merged.yaml"
        focus: "Delete a merged branch"
        flag: "-d"
        kind: "parameter"
  - name: "switch"
    title: "Move between branches with git switch"
    summary: "Create and switch branches with the modern branch-switch command."
    guide: "commands/switch.md"
    manual: "manuals/switch.md"
    lessons:
      - path: "lessons/git-switch-create.yaml"
        focus: "Create and switch to a new branch"
        flag: "-c"
        kind: "parameter"
      - path: "lessons/git-switch-existing.yaml"
        focus: "Switch to an existing branch"
        flag: "git switch <branch>"
        kind: "foundation"
  - name: "checkout"
    title: "Use legacy branch/file restore flow with git checkout"
    summary: "Create branch with checkout and restore one file from HEAD."
    guide: "commands/checkout.md"
    manual: "manuals/checkout.md"
    lessons:
      - path: "lessons/git-checkout-create-branch.yaml"
        focus: "Create and switch branch with checkout"
        flag: "-b"
        kind: "parameter"
      - path: "lessons/git-checkout-restore-file.yaml"
        focus: "Restore one file from HEAD"
        flag: "-- <path>"
        kind: "parameter"
  - name: "restore"
    title: "Recover content with git restore"
    summary: "Restore working tree, unstage paths, and restore from a specific commit."
    guide: "commands/restore.md"
    manual: "manuals/restore.md"
    lessons:
      - path: "lessons/git-restore-working-tree.yaml"
        focus: "Discard unstaged file edits"
        flag: "git restore <path>"
        kind: "foundation"
      - path: "lessons/git-restore-staged.yaml"
        focus: "Unstage a path without losing edits"
        flag: "--staged"
        kind: "parameter"
      - path: "lessons/git-restore-source.yaml"
        focus: "Restore file content from an older commit"
        flag: "--source"
        kind: "parameter"
  - name: "mv"
    title: "Track renames with git mv"
    summary: "Rename tracked files while staging rename metadata."
    guide: "commands/mv.md"
    manual: "manuals/mv.md"
    lessons:
      - path: "lessons/git-mv-rename.yaml"
        focus: "Rename a tracked file and stage the rename"
        flag: "git mv"
        kind: "foundation"
  - name: "rm"
    title: "Remove tracked files with git rm"
    summary: "Delete tracked files from disk or only from the index."
    guide: "commands/rm.md"
    manual: "manuals/rm.md"
    lessons:
      - path: "lessons/git-rm-tracked.yaml"
        focus: "Delete tracked file from index and working tree"
        flag: "git rm <path>"
        kind: "foundation"
      - path: "lessons/git-rm-cached.yaml"
        focus: "Stop tracking a file while keeping local copy"
        flag: "--cached"
        kind: "parameter"
  - name: "merge"
    title: "Integrate branches with git merge"
    summary: "Practice fast-forward, merge commit, and squash merge flows."
    guide: "commands/merge.md"
    manual: "manuals/merge.md"
    lessons:
      - path: "lessons/git-merge-fast-forward.yaml"
        focus: "Integrate branch with fast-forward"
        flag: "--ff-only"
        kind: "parameter"
      - path: "lessons/git-merge-no-ff.yaml"
        focus: "Force a merge commit"
        flag: "--no-ff"
        kind: "parameter"
      - path: "lessons/git-merge-squash.yaml"
        focus: "Combine branch commits into one"
        flag: "--squash"
        kind: "capstone"
  - name: "rebase"
    title: "Rebuild history with git rebase"
    summary: "Move branch base, transplant commit ranges, and handle conflict flow."
    guide: "commands/rebase.md"
    manual: "manuals/rebase.md"
    lessons:
      - path: "lessons/git-rebase-main.yaml"
        focus: "Rebase feature branch on main"
        flag: "git rebase <upstream>"
        kind: "foundation"
      - path: "lessons/git-rebase-onto.yaml"
        focus: "Move a commit range onto a new base"
        flag: "--onto"
        kind: "parameter"
      - path: "lessons/git-rebase-conflict-abort.yaml"
        focus: "Abort a conflicted rebase safely"
        flag: "--abort"
        kind: "parameter"
      - path: "lessons/git-rebase-conflict-continue.yaml"
        focus: "Continue after resolving rebase conflicts"
        flag: "--continue"
        kind: "parameter"
  - name: "cherry-pick"
    title: "Copy commits with git cherry-pick"
    summary: "Apply selected commits to another branch with provenance note support."
    guide: "commands/cherry-pick.md"
    manual: "manuals/cherry-pick.md"
    lessons:
      - path: "lessons/git-cherry-pick-single.yaml"
        focus: "Copy one commit onto current branch"
        flag: "git cherry-pick <commit>"
        kind: "foundation"
      - path: "lessons/git-cherry-pick-x.yaml"
        focus: "Copy a commit and keep source reference"
        flag: "-x"
        kind: "parameter"
  - name: "reset"
    title: "Move HEAD and index state with git reset"
    summary: "Use soft, mixed, hard, and path-level reset modes."
    guide: "commands/reset.md"
    manual: "manuals/reset.md"
    lessons:
      - path: "lessons/git-reset-soft.yaml"
        focus: "Move HEAD back and keep staged changes"
        flag: "--soft"
        kind: "parameter"
      - path: "lessons/git-reset-mixed.yaml"
        focus: "Move HEAD back and unstage changes"
        flag: "--mixed"
        kind: "parameter"
      - path: "lessons/git-reset-hard.yaml"
        focus: "Discard commit and working tree changes"
        flag: "--hard"
        kind: "parameter"
      - path: "lessons/git-reset-unstage-file.yaml"
        focus: "Unstage one file while preserving content"
        flag: "git reset HEAD <path>"
        kind: "foundation"
  - name: "tag"
    title: "Mark releases with git tag"
    summary: "Create lightweight and annotated tags and list tags by pattern."
    guide: "commands/tag.md"
    manual: "manuals/tag.md"
    lessons:
      - path: "lessons/git-tag-lightweight.yaml"
        focus: "Create a lightweight tag"
        flag: "git tag <name>"
        kind: "foundation"
      - path: "lessons/git-tag-annotated.yaml"
        focus: "Create an annotated release tag"
        flag: "-a -m"
        kind: "parameter"
      - path: "lessons/git-tag-list-pattern.yaml"
        focus: "List tags with a glob"
        flag: "-l"
        kind: "parameter"
  - name: "show"
    title: "Inspect objects with git show"
    summary: "Display commit details and stats for commits and tags."
    guide: "commands/show.md"
    manual: "manuals/show.md"
    lessons:
      - path: "lessons/git-show-head.yaml"
        focus: "Inspect files from the latest commit"
        flag: "git show HEAD"
        kind: "foundation"
      - path: "lessons/git-show-stat.yaml"
        focus: "Inspect one-line plus changed-file stats"
        flag: "--stat --oneline"
        kind: "parameter"
  - name: "bisect"
    title: "Find regressions with git bisect"
    summary: "Use binary search to find the first bad commit automatically."
    guide: "commands/bisect.md"
    manual: "manuals/bisect.md"
    lessons:
      - path: "lessons/git-bisect-run.yaml"
        focus: "Locate a regression with bisect run"
        flag: "start / good / bad / run"
        kind: "capstone"
