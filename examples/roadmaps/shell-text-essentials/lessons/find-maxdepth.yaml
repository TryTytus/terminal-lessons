version: 1
id: roadmap-find-maxdepth
title: "Limit search depth"
commands: ["find", "sort"]
difficulty: "intermediate"
intro: "Create shallow-files.txt containing regular files no deeper than two levels below project."
workspace:
  files:
    - path: "project/README.md"
      content: "# Readme\n"
    - path: "project/docs/plan.md"
      content: "# Plan\n"
    - path: "project/src/app.js"
      content: "console.log('app')\n"
    - path: "project/src/features/search.js"
      content: "export const search = true\n"
hints:
  - "Use -maxdepth before the file type filter."
  - "Depth 2 includes project/src/app.js but excludes project/src/features/search.js."
  - "Combine -maxdepth 2 with -type f."
solution:
  commands:
    - "find project -maxdepth 2 -type f | sort > shallow-files.txt"
  explanation: "-maxdepth 2 limits how far find descends from the starting directory."
checks:
  - type: "file_equals"
    path: "shallow-files.txt"
    expected: "project/README.md\nproject/docs/plan.md\nproject/src/app.js\n"
