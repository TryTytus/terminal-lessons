version: 1
id: roadmap-find-maxdepth
title: "Limit search depth"
commands: ["find", "sort"]
difficulty: "beginner"
intro: "Create shallow-files.txt containing regular files at depth 2 or less under project."
workspace:
  files:
    - path: "project/README.md"
      content: "# Project\n"
    - path: "project/docs/plan.md"
      content: "# Plan\n"
    - path: "project/docs/archive/old.md"
      content: "# Old\n"
hints:
  - "Use -maxdepth before the type filter."
  - "Depth 1 is the starting directory contents."
  - "The nested archive file is too deep for maxdepth 2."
solution:
  commands:
    - "find project -maxdepth 2 -type f | sort > shallow-files.txt"
  explanation: "-maxdepth limits how far find descends before applying the rest of the expression."
checks:
  - type: "file_equals"
    path: "shallow-files.txt"
    expected: "project/README.md\nproject/docs/plan.md\n"
