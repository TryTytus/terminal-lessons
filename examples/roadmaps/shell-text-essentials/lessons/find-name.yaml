version: 1
id: roadmap-find-name
title: "Find an exact file name"
commands: ["find", "sort"]
difficulty: "beginner"
intro: "Create targets.txt containing every file named target.txt under project."
workspace:
  files:
    - path: "project/target.txt"
      content: "root target\n"
    - path: "project/docs/target.txt"
      content: "docs target\n"
    - path: "project/docs/notes.txt"
      content: "notes\n"
hints:
  - "Use -name with the exact file name target.txt."
  - "Quote the name pattern."
  - "Sort the paths before saving them."
solution:
  commands:
    - "find project -name \"target.txt\" | sort > targets.txt"
  explanation: "-name matches the final path component against the given shell-style pattern."
checks:
  - type: "file_equals"
    path: "targets.txt"
    expected: "project/docs/target.txt\nproject/target.txt\n"
