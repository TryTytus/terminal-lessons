version: 1
id: roadmap-find-size
title: "Find files by size"
commands: ["find", "sort"]
difficulty: "beginner"
intro: "Create large-files.txt containing files larger than 20 bytes under files."
workspace:
  files:
    - path: "files/tiny.txt"
      content: "small\n"
    - path: "files/big.txt"
      content: "this file is definitely larger than twenty bytes\n"
hints:
  - "Use -size +20c to mean more than 20 bytes."
  - "Use -type f so directories do not appear."
  - "Sort before writing the answer."
solution:
  commands:
    - "find files -type f -size +20c | sort > large-files.txt"
  explanation: "-size +20c keeps files larger than 20 bytes."
checks:
  - type: "file_equals"
    path: "large-files.txt"
    expected: "files/big.txt\n"
