version: 1
id: roadmap-find-type
title: "Find regular files only"
commands: ["find", "sort"]
difficulty: "beginner"
intro: "Create files-only.txt containing only regular files under project."
workspace:
  files:
    - path: "project/docs/guide.md"
      content: "# Guide\n"
    - path: "project/src/app.js"
      content: "app\n"
hints:
  - "Directories appear in plain find output."
  - "Use -type f to keep only regular files."
  - "Sort before writing the answer."
solution:
  commands:
    - "find project -type f | sort > files-only.txt"
  explanation: "-type f filters the traversal to regular files."
checks:
  - type: "file_equals"
    path: "files-only.txt"
    expected: "project/docs/guide.md\nproject/src/app.js\n"
