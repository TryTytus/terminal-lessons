version: 1
id: roadmap-grep-extended-regexp
title: "Match one of several patterns"
commands: ["grep"]
difficulty: "beginner"
intro: "Create alerts.txt containing WARN or ERROR lines from app.log."
workspace:
  files:
    - path: "app.log"
      content: "INFO boot\nWARN cache slow\nDEBUG details\nERROR payment failed\nINFO done\n"
hints:
  - "Use -E for extended regular expressions."
  - "Quote the pattern WARN|ERROR so the shell does not treat | as a pipe."
  - "Redirect the matches into alerts.txt."
solution:
  commands:
    - "grep -E \"WARN|ERROR\" app.log > alerts.txt"
  explanation: "grep -E enables the | alternation operator inside the pattern."
checks:
  - type: "file_equals"
    path: "alerts.txt"
    expected: "WARN cache slow\nERROR payment failed\n"
