version: 1
id: roadmap-grep-invert-match
title: "Exclude matching lines"
commands: ["grep"]
difficulty: "beginner"
intro: "Create clean.log with every line from app.log except DEBUG lines."
workspace:
  files:
    - path: "app.log"
      content: "INFO boot\nDEBUG config loaded\nWARN disk nearly full\nDEBUG cache details\nERROR write failed\n"
hints:
  - "Use -v to invert the match."
  - "Search for DEBUG."
  - "Redirect the remaining lines into clean.log."
solution:
  commands:
    - "grep -v DEBUG app.log > clean.log"
  explanation: "grep -v prints lines that do not match the pattern."
checks:
  - type: "file_equals"
    path: "clean.log"
    expected: "INFO boot\nWARN disk nearly full\nERROR write failed\n"
