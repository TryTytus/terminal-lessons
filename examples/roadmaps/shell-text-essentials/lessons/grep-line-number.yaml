version: 1
id: roadmap-grep-line-number
title: "Show line numbers"
commands: ["grep"]
difficulty: "beginner"
intro: "Create timeout-lines.txt with timeout matches and original line numbers."
workspace:
  files:
    - path: "service.log"
      content: "startup ok\ncache warm\ntimeout waiting for api\nretry scheduled\ntimeout waiting for db\n"
hints:
  - "Use -n to include line numbers."
  - "Search for timeout."
  - "Redirect the result into timeout-lines.txt."
solution:
  commands:
    - "grep -n timeout service.log > timeout-lines.txt"
  explanation: "grep -n prefixes each matching line with its original line number."
checks:
  - type: "file_equals"
    path: "timeout-lines.txt"
    expected: "3:timeout waiting for api\n5:timeout waiting for db\n"
