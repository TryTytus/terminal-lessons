version: 1
id: roadmap-grep-line-number
title: "Show line numbers"
commands: ["grep"]
difficulty: "beginner"
intro: "Create numbered-errors.txt with ERROR matches from app.log prefixed by their original line numbers."
workspace:
  files:
    - path: "app.log"
      content: "INFO boot\nWARN cache\nERROR database timeout\nINFO retry\nERROR request failed\n"
hints:
  - "grep can prefix matches with line numbers."
  - "Use -n together with the ERROR pattern."
  - "The output format is line:number followed by the matching text."
solution:
  commands:
    - "grep -n ERROR app.log > numbered-errors.txt"
  explanation: "grep -n adds the original line number before each matching line."
checks:
  - type: "file_equals"
    path: "numbered-errors.txt"
    expected: "3:ERROR database timeout\n5:ERROR request failed\n"
