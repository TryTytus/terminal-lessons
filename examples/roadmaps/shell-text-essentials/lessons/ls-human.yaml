version: 1
id: roadmap-ls-human
title: "Show human-readable sizes"
commands: ["ls"]
difficulty: "beginner"
intro: "Create human-sizes.txt with a human-readable long listing of sizes."
workspace:
  files:
    - path: "sizes/large.bin"
      content: ""
    - path: "sizes/tiny.txt"
      content: "tiny\n"
hints:
  - "Combine -l and -h as -lh."
  - "The h flag makes byte counts easier to read."
  - "Redirect the listing into human-sizes.txt."
solution:
  commands:
    - "ls -lh sizes > human-sizes.txt"
  explanation: "ls -lh keeps long format but formats sizes with units."
checks:
  - type: "file_contains"
    path: "human-sizes.txt"
    expected: "large.bin"
  - type: "file_contains"
    path: "human-sizes.txt"
    expected: "K"
