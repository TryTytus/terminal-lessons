version: 1
id: roadmap-sort-basic
title: "Sort alphabetically"
commands: ["sort"]
difficulty: "beginner"
intro: "Create sorted-names.txt with names.txt sorted alphabetically."
workspace:
  files:
    - path: "names.txt"
      content: "zara\nada\nmaya\n"
hints:
  - "sort reads lines and writes them in order."
  - "Use names.txt as the input file."
  - "Redirect output into sorted-names.txt."
solution:
  commands:
    - "sort names.txt > sorted-names.txt"
  explanation: "Default sort orders lines lexicographically."
checks:
  - type: "file_equals"
    path: "sorted-names.txt"
    expected: "ada\nmaya\nzara\n"
