version: 1
id: roadmap-sort-numeric
title: "Sort numbers numerically"
commands: ["sort"]
difficulty: "beginner"
intro: "Create sorted-ports.txt with ports.txt sorted by numeric value."
workspace:
  files:
    - path: "ports.txt"
      content: "8080\n22\n443\n"
hints:
  - "Default sort compares text, so 8080 can come before 22."
  - "Use -n for numeric sorting."
  - "Redirect output into sorted-ports.txt."
solution:
  commands:
    - "sort -n ports.txt > sorted-ports.txt"
  explanation: "sort -n compares values as numbers."
checks:
  - type: "file_equals"
    path: "sorted-ports.txt"
    expected: "22\n443\n8080\n"
