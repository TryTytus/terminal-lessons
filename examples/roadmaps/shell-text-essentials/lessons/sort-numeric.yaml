version: 1
id: roadmap-sort-numeric
title: "Sort numbers numerically"
commands: ["sort"]
difficulty: "beginner"
intro: "Create sorted-ports.txt with the port numbers from ports.txt in numeric order."
workspace:
  files:
    - path: "ports.txt"
      content: "443\n80\n3000\n22\n"
hints:
  - "Plain sort compares text, so 3000 can sort before 443."
  - "Use -n for numeric sorting."
solution:
  commands:
    - "sort -n ports.txt > sorted-ports.txt"
  explanation: "sort -n compares lines as numbers."
checks:
  - type: "file_equals"
    path: "sorted-ports.txt"
    expected: "22\n80\n443\n3000\n"
