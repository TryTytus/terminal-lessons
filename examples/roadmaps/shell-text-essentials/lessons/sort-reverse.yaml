version: 1
id: roadmap-sort-reverse
title: "Sort in reverse order"
commands: ["sort"]
difficulty: "beginner"
intro: "Create reverse-names.txt with names.txt sorted from z to a."
workspace:
  files:
    - path: "names.txt"
      content: "ada\nzara\nmaya\n"
hints:
  - "Use -r to reverse the final sorted order."
  - "The input does not need to be pre-sorted."
  - "Redirect output into reverse-names.txt."
solution:
  commands:
    - "sort -r names.txt > reverse-names.txt"
  explanation: "sort -r reverses the ordering that sort would normally produce."
checks:
  - type: "file_equals"
    path: "reverse-names.txt"
    expected: "zara\nmaya\nada\n"
