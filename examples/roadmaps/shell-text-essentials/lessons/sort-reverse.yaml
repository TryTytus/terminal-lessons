version: 1
id: roadmap-sort-reverse
title: "Sort in reverse order"
commands: ["sort"]
difficulty: "beginner"
intro: "Create reverse-names.txt with the names from names.txt sorted from Z to A."
workspace:
  files:
    - path: "names.txt"
      content: "ada\nlinus\ngrace\n"
hints:
  - "Use -r to reverse the sorted result."
  - "The input does not need to be sorted first."
solution:
  commands:
    - "sort -r names.txt > reverse-names.txt"
  explanation: "sort -r sorts and then reverses the order."
checks:
  - type: "file_equals"
    path: "reverse-names.txt"
    expected: "linus\ngrace\nada\n"
