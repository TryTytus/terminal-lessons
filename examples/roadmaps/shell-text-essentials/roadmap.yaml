version: 1
id: shell-text-essentials
title: "Shell Text Essentials"
summary: "A practical roadmap for everyday shell navigation, file operations, permissions, text viewing, search, and text processing."
description: "Practice one command form at a time through focused YAML exercises, short command guides, and full Markdown manuals. The roadmap starts with navigation and file basics, then builds into permissions, shell utilities, text viewing, grep, find, sort, sed, and awk."
difficulty: "beginner to intermediate"
commands:
  - name: "pwd"
    title: "Print the current directory with pwd"
    summary: "Show the current working directory and resolve physical paths through symlinks."
    guide: "commands/pwd.md"
    manual: "manuals/pwd.md"
    lessons:
      - path: "lessons/pwd-basic.yaml"
        focus: "Print the current working directory"
        flag: "pwd"
        kind: "foundation"
      - path: "lessons/pwd-physical.yaml"
        focus: "Resolve symlinks in the current path"
        flag: "-P"
        kind: "parameter"
  - name: "cd"
    title: "Move through directories with cd"
    summary: "Navigate into folders, home, the previous directory, and parent directories."
    guide: "commands/cd.md"
    manual: "manuals/cd.md"
    lessons:
      - path: "lessons/cd-basic.yaml"
        focus: "Navigate into a named directory"
        flag: "cd <dir>"
        kind: "foundation"
      - path: "lessons/cd-home.yaml"
        focus: "Navigate to the home directory"
        flag: "~"
        kind: "parameter"
      - path: "lessons/cd-previous.yaml"
        focus: "Return to the previous directory"
        flag: "-"
        kind: "parameter"
      - path: "lessons/cd-parent.yaml"
        focus: "Move to the parent directory"
        flag: ".."
        kind: "parameter"
  - name: "ls"
    title: "List files with ls"
    summary: "Inspect directory contents with default, detailed, hidden, human-readable, recursive, and time-sorted listings."
    guide: "commands/ls.md"
    manual: "manuals/ls.md"
    lessons:
      - path: "lessons/ls-basic.yaml"
        focus: "Default directory listing"
        flag: "ls"
        kind: "foundation"
      - path: "lessons/ls-long.yaml"
        focus: "Long listing format"
        flag: "-l"
        kind: "parameter"
      - path: "lessons/ls-all.yaml"
        focus: "Show hidden files"
        flag: "-a"
        kind: "parameter"
      - path: "lessons/ls-human.yaml"
        focus: "Human-readable sizes"
        flag: "-lh"
        kind: "parameter"
      - path: "lessons/ls-recursive.yaml"
        focus: "Recursive listing"
        flag: "-R"
        kind: "parameter"
      - path: "lessons/ls-time.yaml"
        focus: "Sort listings by time"
        flag: "-t"
        kind: "parameter"
  - name: "mkdir"
    title: "Create directories with mkdir"
    summary: "Create one directory or a whole missing parent path."
    guide: "commands/mkdir.md"
    manual: "manuals/mkdir.md"
    lessons:
      - path: "lessons/mkdir-basic.yaml"
        focus: "Create a directory"
        flag: "mkdir <dir>"
        kind: "foundation"
      - path: "lessons/mkdir-parents.yaml"
        focus: "Create missing parent directories"
        flag: "-p"
        kind: "parameter"
  - name: "rmdir"
    title: "Remove empty directories with rmdir"
    summary: "Delete directories only when they are empty."
    guide: "commands/rmdir.md"
    manual: "manuals/rmdir.md"
    lessons:
      - path: "lessons/rmdir-empty.yaml"
        focus: "Remove an empty directory"
        flag: "rmdir"
        kind: "foundation"
  - name: "touch"
    title: "Create files with touch"
    summary: "Create an empty file or update a timestamp."
    guide: "commands/touch.md"
    manual: "manuals/touch.md"
    lessons:
      - path: "lessons/touch-basic.yaml"
        focus: "Create an empty file"
        flag: "touch <file>"
        kind: "foundation"
  - name: "echo"
    title: "Print text with echo"
    summary: "Print text to stdout and use escapes when the shell supports them."
    guide: "commands/echo.md"
    manual: "manuals/echo.md"
    lessons:
      - path: "lessons/echo-basic.yaml"
        focus: "Print a string"
        flag: "echo \"string\""
        kind: "foundation"
      - path: "lessons/echo-escapes.yaml"
        focus: "Interpret backslash escapes"
        flag: "-e"
        kind: "parameter"
  - name: "cp"
    title: "Copy files and directories with cp"
    summary: "Copy files, copy directory trees, confirm overwrites, and show verbose copy output."
    guide: "commands/cp.md"
    manual: "manuals/cp.md"
    lessons:
      - path: "lessons/cp-file.yaml"
        focus: "Copy a file"
        flag: "cp <src> <dest>"
        kind: "foundation"
      - path: "lessons/cp-recursive.yaml"
        focus: "Copy directories recursively"
        flag: "-r"
        kind: "parameter"
      - path: "lessons/cp-interactive.yaml"
        focus: "Prompt before overwrite"
        flag: "-i"
        kind: "parameter"
      - path: "lessons/cp-verbose.yaml"
        focus: "Print verbose copy output"
        flag: "-v"
        kind: "parameter"
  - name: "mv"
    title: "Move and rename with mv"
    summary: "Rename files, confirm replacement, and avoid clobbering existing paths."
    guide: "commands/mv.md"
    manual: "manuals/mv.md"
    lessons:
      - path: "lessons/mv-basic.yaml"
        focus: "Move or rename a file"
        flag: "mv <src> <dest>"
        kind: "foundation"
      - path: "lessons/mv-interactive.yaml"
        focus: "Prompt before overwrite"
        flag: "-i"
        kind: "parameter"
      - path: "lessons/mv-no-clobber.yaml"
        focus: "Do not overwrite existing files"
        flag: "-n"
        kind: "parameter"
  - name: "rm"
    title: "Remove files with rm"
    summary: "Delete files, confirm interactive deletion, remove directory trees, and force missing-file cleanup."
    guide: "commands/rm.md"
    manual: "manuals/rm.md"
    lessons:
      - path: "lessons/rm-file.yaml"
        focus: "Remove a file"
        flag: "rm <file>"
        kind: "foundation"
      - path: "lessons/rm-interactive.yaml"
        focus: "Interactive removal"
        flag: "-i"
        kind: "parameter"
      - path: "lessons/rm-recursive.yaml"
        focus: "Remove directories recursively"
        flag: "-r"
        kind: "parameter"
      - path: "lessons/rm-force.yaml"
        focus: "Force removal and ignore missing paths"
        flag: "-f"
        kind: "parameter"
  - name: "cat"
    title: "Print file contents with cat"
    summary: "Display whole files and number output lines."
    guide: "commands/cat.md"
    manual: "manuals/cat.md"
    lessons:
      - path: "lessons/cat-file.yaml"
        focus: "View file contents"
        flag: "cat <file>"
        kind: "foundation"
      - path: "lessons/cat-number.yaml"
        focus: "Number all output lines"
        flag: "-n"
        kind: "parameter"
  - name: "find"
    title: "Locate paths with find"
    summary: "Walk directory trees and filter by name, case, type, age, size, depth, and actions."
    guide: "commands/find.md"
    manual: "manuals/find.md"
    lessons:
      - path: "lessons/find-basic.yaml"
        focus: "List everything below a directory"
        flag: "find ."
        kind: "foundation"
      - path: "lessons/find-name.yaml"
        focus: "Find by exact name"
        flag: "-name"
        kind: "pattern"
      - path: "lessons/find-iname.yaml"
        focus: "Find names case-insensitively"
        flag: "-iname"
        kind: "parameter"
      - path: "lessons/find-type.yaml"
        focus: "Find files only"
        flag: "-type f"
        kind: "parameter"
      - path: "lessons/find-type-dir.yaml"
        focus: "Find directories only"
        flag: "-type d"
        kind: "parameter"
      - path: "lessons/find-mtime.yaml"
        focus: "Find by modification time"
        flag: "-mtime"
        kind: "parameter"
      - path: "lessons/find-size.yaml"
        focus: "Find by file size"
        flag: "-size"
        kind: "parameter"
      - path: "lessons/find-exec.yaml"
        focus: "Execute a command for each found path"
        flag: "-exec"
        kind: "parameter"
      - path: "lessons/find-maxdepth.yaml"
        focus: "Limit search depth"
        flag: "-maxdepth"
        kind: "parameter"
  - name: "chmod"
    title: "Change permissions with chmod"
    summary: "Add execute bits, use symbolic changes, numeric modes, and recursive permission updates."
    guide: "commands/chmod.md"
    manual: "manuals/chmod.md"
    lessons:
      - path: "lessons/chmod-executable.yaml"
        focus: "Add execute permission"
        flag: "+x"
        kind: "parameter"
      - path: "lessons/chmod-symbolic-specific.yaml"
        focus: "Apply symbolic user/group permission changes"
        flag: "u+rw,g-w"
        kind: "parameter"
      - path: "lessons/chmod-755.yaml"
        focus: "Use octal mode 755"
        flag: "755"
        kind: "parameter"
      - path: "lessons/chmod-644.yaml"
        focus: "Use octal mode 644"
        flag: "644"
        kind: "parameter"
      - path: "lessons/chmod-recursive.yaml"
        focus: "Change permissions recursively"
        flag: "-R"
        kind: "parameter"
  - name: "chown"
    title: "Change ownership with chown"
    summary: "Practice safe current-user ownership changes without sudo."
    guide: "commands/chown.md"
    manual: "manuals/chown.md"
    lessons:
      - path: "lessons/chown-user.yaml"
        focus: "Change owner to the current user"
        flag: "user <file>"
        kind: "parameter"
      - path: "lessons/chown-user-group.yaml"
        focus: "Change owner and group together"
        flag: "user:group <file>"
        kind: "parameter"
      - path: "lessons/chown-recursive.yaml"
        focus: "Change ownership recursively"
        flag: "-R"
        kind: "parameter"
  - name: "chgrp"
    title: "Change group with chgrp"
    summary: "Set file group ownership with the current primary group."
    guide: "commands/chgrp.md"
    manual: "manuals/chgrp.md"
    lessons:
      - path: "lessons/chgrp-group.yaml"
        focus: "Change group only"
        flag: "group <file>"
        kind: "parameter"
  - name: "alias"
    title: "Create temporary aliases"
    summary: "Define a shell shortcut for the current terminal session."
    guide: "commands/alias.md"
    manual: "manuals/alias.md"
    lessons:
      - path: "lessons/alias-basic.yaml"
        focus: "Create a temporary alias"
        flag: "alias"
        kind: "foundation"
  - name: "unalias"
    title: "Remove aliases with unalias"
    summary: "Delete a temporary alias from the current shell session."
    guide: "commands/unalias.md"
    manual: "manuals/unalias.md"
    lessons:
      - path: "lessons/unalias-basic.yaml"
        focus: "Remove an alias"
        flag: "unalias"
        kind: "foundation"
  - name: "history"
    title: "Inspect command history"
    summary: "Write recent commands from the interactive shell history."
    guide: "commands/history.md"
    manual: "manuals/history.md"
    lessons:
      - path: "lessons/history-basic.yaml"
        focus: "View command history"
        flag: "history"
        kind: "foundation"
  - name: "less"
    title: "Page through text with less"
    summary: "Open longer text interactively, search inside it, and quit back to the shell."
    guide: "commands/less.md"
    manual: "manuals/less.md"
    lessons:
      - path: "lessons/less-search.yaml"
        focus: "Navigate and search in less"
        flag: "less"
        kind: "foundation"
  - name: "head"
    title: "Read file starts with head"
    summary: "Show the first N lines of a file."
    guide: "commands/head.md"
    manual: "manuals/head.md"
    lessons:
      - path: "lessons/head-lines.yaml"
        focus: "View the first N lines"
        flag: "-n"
        kind: "parameter"
  - name: "tail"
    title: "Read file ends with tail"
    summary: "Show the last N lines and follow appended log output."
    guide: "commands/tail.md"
    manual: "manuals/tail.md"
    lessons:
      - path: "lessons/tail-lines.yaml"
        focus: "View the last N lines"
        flag: "-n"
        kind: "parameter"
      - path: "lessons/tail-follow.yaml"
        focus: "Follow file growth"
        flag: "-f"
        kind: "parameter"
  - name: "grep"
    title: "Search text with grep"
    summary: "Find matching lines, ignore case, invert matches, recurse, print line numbers, count matches, and use extended patterns."
    guide: "commands/grep.md"
    manual: "manuals/grep.md"
    lessons:
      - path: "lessons/grep-basic.yaml"
        focus: "Search exact text without flags"
        flag: "grep \"pattern\""
        kind: "foundation"
      - path: "lessons/grep-ignore-case.yaml"
        focus: "Match text regardless of case"
        flag: "-i / --ignore-case"
        kind: "parameter"
      - path: "lessons/grep-invert-match.yaml"
        focus: "Keep everything except matching lines"
        flag: "-v / --invert-match"
        kind: "parameter"
      - path: "lessons/grep-recursive.yaml"
        focus: "Search recursively in a directory"
        flag: "-r / --recursive"
        kind: "parameter"
      - path: "lessons/grep-line-number.yaml"
        focus: "Show matching line numbers"
        flag: "-n / --line-number"
        kind: "parameter"
      - path: "lessons/grep-count.yaml"
        focus: "Count matching lines"
        flag: "-c / --count"
        kind: "parameter"
      - path: "lessons/grep-extended-regexp.yaml"
        focus: "Match one of several patterns"
        flag: "-E / --extended-regexp"
        kind: "parameter"
  - name: "wc"
    title: "Count text with wc"
    summary: "Count lines, words, and bytes with redirection for clean numeric output."
    guide: "commands/wc.md"
    manual: "manuals/wc.md"
    lessons:
      - path: "lessons/wc-lines.yaml"
        focus: "Count lines"
        flag: "-l"
        kind: "parameter"
      - path: "lessons/wc-words.yaml"
        focus: "Count words"
        flag: "-w"
        kind: "parameter"
      - path: "lessons/wc-bytes.yaml"
        focus: "Count bytes"
        flag: "-c"
        kind: "parameter"
  - name: "sort"
    title: "Order lines with sort"
    summary: "Sort lines alphabetically, numerically, in reverse, and by a chosen field."
    guide: "commands/sort.md"
    manual: "manuals/sort.md"
    lessons:
      - path: "lessons/sort-basic.yaml"
        focus: "Default alphabetical sort"
        flag: "sort"
        kind: "foundation"
      - path: "lessons/sort-numeric.yaml"
        focus: "Numerical sort"
        flag: "-n / --numeric-sort"
        kind: "parameter"
      - path: "lessons/sort-reverse.yaml"
        focus: "Reverse sort"
        flag: "-r / --reverse"
        kind: "parameter"
      - path: "lessons/sort-key.yaml"
        focus: "Sort records by a specific field"
        flag: "-k"
        kind: "capstone"
  - name: "uniq"
    title: "Collapse adjacent duplicates with uniq"
    summary: "Remove or count repeated adjacent lines after sorting when needed."
    guide: "commands/uniq.md"
    manual: "manuals/uniq.md"
    lessons:
      - path: "lessons/uniq-basic.yaml"
        focus: "Remove duplicate adjacent lines"
        flag: "uniq"
        kind: "foundation"
      - path: "lessons/uniq-count.yaml"
        focus: "Count occurrences of adjacent lines"
        flag: "-c"
        kind: "parameter"
  - name: "nl"
    title: "Number lines with nl"
    summary: "Add line numbers to text while preserving the original file."
    guide: "commands/nl.md"
    manual: "manuals/nl.md"
    lessons:
      - path: "lessons/nl-basic.yaml"
        focus: "Number lines of files"
        flag: "nl"
        kind: "foundation"
  - name: "sed"
    title: "Edit streams with sed"
    summary: "Replace text, edit files in place, and delete matching lines."
    guide: "commands/sed.md"
    manual: "manuals/sed.md"
    lessons:
      - path: "lessons/sed-substitute.yaml"
        focus: "Replace first occurrence on each line"
        flag: "s/old/new/"
        kind: "foundation"
      - path: "lessons/sed-global.yaml"
        focus: "Replace all occurrences on each line"
        flag: "s/old/new/g"
        kind: "parameter"
      - path: "lessons/sed-in-place.yaml"
        focus: "Edit a file in place"
        flag: "-i"
        kind: "parameter"
      - path: "lessons/sed-delete.yaml"
        focus: "Delete matching lines"
        flag: "/pattern/d"
        kind: "parameter"
  - name: "awk"
    title: "Extract fields with awk"
    summary: "Print columns, choose field separators, and match records by pattern."
    guide: "commands/awk.md"
    manual: "manuals/awk.md"
    lessons:
      - path: "lessons/awk-column.yaml"
        focus: "Print a specific column"
        flag: "{print $1}"
        kind: "foundation"
      - path: "lessons/awk-separator.yaml"
        focus: "Specify a field separator"
        flag: "-F"
        kind: "parameter"
      - path: "lessons/awk-pattern.yaml"
        focus: "Print records matching a pattern"
        flag: "/pattern/ {print $0}"
        kind: "parameter"
