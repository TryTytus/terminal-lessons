version: 1
id: shell-text-essentials
title: "Shell Text Essentials"
summary: "A practical roadmap for searching, finding, and sorting text files with daily-use flags."
description: "Build confidence with grep, find, and sort through focused exercises for base usage, popular parameters, and small capstones that combine flags."
difficulty: "beginner to intermediate"
commands:
  - name: "grep"
    title: "Search text with grep"
    summary: "Find matching lines, ignore case, invert matches, print line numbers, and use extended patterns."
    guide: "commands/grep.md"
    manual: "manuals/grep.md"
    lessons:
      - path: "lessons/grep-basic.yaml"
        focus: "Search exact text without flags"
        kind: "foundation"
      - path: "lessons/grep-ignore-case.yaml"
        focus: "Match text regardless of case"
        flag: "-i / --ignore-case"
        kind: "parameter"
      - path: "lessons/grep-invert-match.yaml"
        focus: "Keep everything except matching lines"
        flag: "-v / --invert-match"
        kind: "parameter"
      - path: "lessons/grep-line-number.yaml"
        focus: "Show matching line numbers"
        flag: "-n / --line-number"
        kind: "parameter"
      - path: "lessons/grep-extended-regexp.yaml"
        focus: "Match one of several patterns"
        flag: "-E / --extended-regexp"
        kind: "parameter"
  - name: "find"
    title: "Locate files with find"
    summary: "Walk a directory tree and filter by file name, type, and depth."
    guide: "commands/find.md"
    manual: "manuals/find.md"
    lessons:
      - path: "lessons/find-basic.yaml"
        focus: "List everything below the workspace"
        kind: "foundation"
      - path: "lessons/find-name.yaml"
        focus: "Match file names with shell-style patterns"
        flag: "-name"
        kind: "pattern"
      - path: "lessons/find-type.yaml"
        focus: "Keep only regular files"
        flag: "-type f"
        kind: "parameter"
      - path: "lessons/find-maxdepth.yaml"
        focus: "Limit how deep find descends"
        flag: "-maxdepth"
        kind: "parameter"
  - name: "sort"
    title: "Order text with sort"
    summary: "Sort lines alphabetically, numerically, in reverse, and by a chosen column."
    guide: "commands/sort.md"
    manual: "manuals/sort.md"
    lessons:
      - path: "lessons/sort-basic.yaml"
        focus: "Sort lines alphabetically"
        kind: "foundation"
      - path: "lessons/sort-numeric.yaml"
        focus: "Sort numbers by numeric value"
        flag: "-n / --numeric-sort"
        kind: "parameter"
      - path: "lessons/sort-reverse.yaml"
        focus: "Reverse the sorted order"
        flag: "-r / --reverse"
        kind: "parameter"
      - path: "lessons/sort-key.yaml"
        focus: "Sort records by a specific field"
        flag: "-k"
        kind: "capstone"
